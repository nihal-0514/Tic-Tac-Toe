<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    background:lightblue;
}
h1{
    margin-top:20px;
}
.board{
    width:300px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-template-rows:repeat(3,100px);
}
.box{
    border:2px solid black;
    font-size:50px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    background:white;
}
.box:hover{
    background:lightgray;
}
#result{
    font-size:30px;
    margin:20px;
    font-weight:bold;
}
button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="result">Player X Turn</div>
<div class="board">
    <div class="box" onclick="play(this,0)"></div>
    <div class="box" onclick="play(this,1)"></div>
    <div class="box" onclick="play(this,2)"></div>
    <div class="box" onclick="play(this,3)"></div>
    <div class="box" onclick="play(this,4)"></div>
    <div class="box" onclick="play(this,5)"></div>
    <div class="box" onclick="play(this,6)"></div>
    <div class="box" onclick="play(this,7)"></div>
    <div class="box" onclick="play(this,8)"></div>
</div>
<br>
<button onclick="restart()">Restart</button>

<script>
let turn = "X";
let game = ["","","","","","","","",""];
let over = false;
function play(box,index){
if(box.innerHTML != "" || over){
    return;
}
box.innerHTML = turn;
game[index] = turn;
checkWinner();
if(!over){
    if(turn == "X"){
        turn = "O";
    }
    else{
        turn = "X";
    }
    document.getElementById("result").innerHTML = "Player " + turn + " Turn";
}
}
function checkWinner(){
let win = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];
for(let i=0; i<win.length; i++){
let a = win[i][0];
let b = win[i][1];
let c = win[i][2];
if(game[a] != "" && game[a] == game[b] && game[b] == game[c]){
    document.getElementById("result").innerHTML = "Player " + game[a] + " Wins!";
    over = true;
    return;
}
}
if(
game[0] != "" &&
game[1] != "" &&
game[2] != "" &&
game[3] != "" &&
game[4] != "" &&
game[5] != "" &&
game[6] != "" &&
game[7] != "" &&
game[8] != ""
){
    document.getElementById("result").innerHTML = "Match Draw!";
    over = true;
}
}
function restart(){
location.reload();
}
</script>
</body>
</html>
